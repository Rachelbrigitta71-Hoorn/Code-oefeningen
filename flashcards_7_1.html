<title>Flitskaarten – Code+ Deel 4 Hoofdstuk 7.1</title>

<style>
  :root {
    --bg: #f0f4ff;
    --card-front: #2d3a8c;
    --card-back: #ffffff;
    --accent: #f5a623;
    --accent2: #e84393;
    --text-light: #ffffff;
    --text-dark: #1a1a2e;
    --muted: #6b7280;
    --shadow: rgba(45,58,140,0.18);
    --tag-woord: #4f46e5;
    --tag-verbinding: #0891b2;
    --tag-idioom: #be185d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 20%, rgba(79,70,229,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(232,67,147,0.07) 0%, transparent 50%);
    min-height: 100vh;
    color: var(--text-dark);
    padding: 1.5rem 1rem 4rem;
  }
  .header { max-width: 680px; margin: 0 auto 2rem; display: flex; align-items: center; gap: 1rem; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 4px 12px var(--shadow); flex-shrink: 0; }
  .header-text h1 { font-size: 1.4rem; font-weight: 900; color: var(--card-front); line-height: 1.2; }
  .header-text p { font-size: 0.85rem; color: var(--muted); margin-top: 0.2rem; }
  .controls { max-width: 680px; margin: 0 auto 1.5rem; display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .filter-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .filter-btn { border: 2px solid transparent; border-radius: 20px; padding: 0.3rem 0.9rem; font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .filter-btn.all { background: var(--card-front); color: white; }
  .filter-btn.woord { background: #ede9fe; color: var(--tag-woord); border-color: var(--tag-woord); }
  .filter-btn.verbinding { background: #e0f2fe; color: var(--tag-verbinding); border-color: var(--tag-verbinding); }
  .filter-btn.active, .filter-btn:hover { opacity: 0.8; transform: scale(1.05); }
  .progress-wrap { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
  .progress-wrap span { color: var(--card-front); }
  .scene { max-width: 680px; margin: 0 auto; height: 280px; perspective: 1000px; cursor: pointer; user-select: none; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; border-radius: 20px; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; box-shadow: 0 8px 32px var(--shadow); }
  .card-front { background: linear-gradient(135deg, var(--card-front) 0%, #4338ca 100%); color: white; }
  .card-front .card-tag { position: absolute; top: 1.2rem; right: 1.2rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 10px; opacity: 0.85; }
  .tag-woord-badge { background: rgba(255,255,255,0.2); }
  .tag-verbinding-badge { background: rgba(8,145,178,0.4); }
  .card-front .card-num { position: absolute; top: 1.2rem; left: 1.2rem; font-size: 0.75rem; opacity: 0.5; font-weight: 600; }
  .card-front .term { font-family: 'Lora', serif; font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 600; text-align: center; line-height: 1.3; }
  .card-front .hint { margin-top: 0.8rem; font-size: 0.8rem; opacity: 0.6; font-style: italic; }
  .card-back { background: white; transform: rotateY(180deg); text-align: center; }
  .card-back .def { font-family: 'Lora', serif; font-size: clamp(1rem, 3.5vw, 1.3rem); color: var(--text-dark); line-height: 1.6; font-style: italic; margin-bottom: 0.8rem; }
  .card-back .ex { font-size: 0.82rem; color: var(--muted); line-height: 1.5; max-width: 500px; }
  .card-back .ex::before { content: '"'; }
  .card-back .ex::after  { content: '"'; }
  .nav-row { max-width: 680px; margin: 1.2rem auto 0; display: flex; gap: 0.8rem; justify-content: center; align-items: center; }
  .nav-btn { background: var(--card-front); color: white; border: none; border-radius: 50px; padding: 0.6rem 1.6rem; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: 0 3px 10px var(--shadow); }
  .nav-btn:hover { background: #3730a3; transform: translateY(-1px); }
  .nav-btn.shuffle { background: var(--accent); color: var(--text-dark); }
  .progress-bar-wrap { max-width: 680px; margin: 1rem auto 0; background: rgba(45,58,140,0.1); border-radius: 10px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--card-front), var(--accent2)); border-radius: 10px; transition: width 0.3s; }
  .feedback-row { max-width: 680px; margin: 1rem auto 0; display: flex; gap: 0.8rem; justify-content: center; }
  .fb-btn { flex: 1; max-width: 200px; border: none; border-radius: 12px; padding: 0.6rem 1rem; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
  .fb-btn:hover { transform: translateY(-2px); }
  .fb-btn.known { background: #d1fae5; color: #065f46; }
  .fb-btn.unknown { background: #fee2e2; color: #991b1b; }
  .fb-hint { text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; font-style: italic; }
  .score-panel { display: none; max-width: 680px; margin: 0 auto; background: white; border-radius: 20px; padding: 2.5rem 2rem; text-align: center; box-shadow: 0 8px 32px var(--shadow); }
  .score-panel.show { display: block; }
  .score-panel .avatar-big { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); margin-bottom: 1rem; }
  .score-big { font-size: 3.5rem; font-weight: 900; color: var(--card-front); }
  .score-msg { font-size: 1.05rem; color: var(--muted); margin-top: 0.5rem; font-style: italic; }
  .restart-btn { margin-top: 1.5rem; background: var(--card-front); color: white; border: none; border-radius: 50px; padding: 0.7rem 2rem; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; box-shadow: 0 3px 10px var(--shadow); }
  .kbd-hint { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; }
  kbd { background: #e5e7eb; border-radius: 4px; padding: 0.1rem 0.4rem; font-family: monospace; font-size: 0.75rem; }
</style>

  { type:"woord", term:"militair", def:"wat te maken heeft met het leger", ex:"De militaire operatie werd nauwkeurig gepland." },
  { type:"woord", term:"ontdekking, de", def:"iets wat voor het eerst gevonden of onthuld wordt", ex:"De ontdekking van penicilline redde miljoenen levens." },
  { type:"woord", term:"onderkennen*", def:"iets herkennen of inzien, vaak iets negatiefs", ex:"Het is belangrijk om problemen vroeg te onderkennen." },
  { type:"woord", term:"planeet, de", def:"een groot hemellichaam dat om een ster draait", ex:"De aarde is de derde planeet van ons zonnestelsel." },
  { type:"woord", term:"rang, de", def:"de positie in een hiërarchie; een graad of titel", ex:"Hij klom op tot de hoogste rang binnen het leger." },
  { type:"woord", term:"rekken", def:"iets langer maken; ook: tijd verlengen", ex:"Ze probeerde de vergadering te rekken om een beslissing uit te stellen." },
  { type:"woord", term:"simpel", def:"eenvoudig; niet ingewikkeld", ex:"De oplossing was verrassend simpel." },
  { type:"woord", term:"sleutelen", def:"knutselen aan iets mechanisch; repareren", ex:"Hij sleutelde graag aan oude auto's in zijn vrije tijd." },
  { type:"woord", term:"speuren", def:"zoeken of opsporen, zoals een detective", ex:"De rechercheur speurde naar aanwijzingen op de plaats delict." },
  { type:"woord", term:"status, de", def:"de positie of het aanzien van iemand in de maatschappij", ex:"Een hoge functie geeft vaak status in de samenleving." },
  { type:"woord", term:"stiekem", def:"in het geheim; zonder dat anderen het weten", ex:"Ze at stiekem de laatste koek op." },
  { type:"woord", term:"tamelijk", def:"vrij; redelijk; niet helemaal maar wel behoorlijk", ex:"Het was tamelijk warm voor de tijd van het jaar." },
  { type:"woord", term:"telescoop, de", def:"een instrument om ver weg gelegen objecten te bekijken", ex:"Met een telescoop kun je de kraters op de maan zien." },
  { type:"woord", term:"terugkeren", def:"terugkomen naar een plek of situatie", ex:"Na zijn reis keerde hij terug naar zijn geboortestad." },
  { type:"woord", term:"toewijzen*", def:"aan iemand geven of toekennen", ex:"De rechter wees de voogdij toe aan de moeder." },
  { type:"woord", term:"uitsteeksel, het", def:"een deel dat uitsteekt of uitpuilt", ex:"De rots had een scherp uitsteeksel aan de zijkant." },
  { type:"woord", term:"uitvinding, de", def:"iets wat voor het eerst bedacht of gemaakt wordt", ex:"De uitvinding van het wiel veranderde de menselijke geschiedenis." },
  { type:"woord", term:"uitzoeken*", def:"iets onderzoeken; ook: iets selecteren", ex:"Hij moest uitzoeken waarom het systeem niet werkte." },
  { type:"woord", term:"uurwerk, het", def:"het mechanisme van een klok of horloge", ex:"Het oude uurwerk tikte rustig in de hal." },
  { type:"woord", term:"verontreiniging, de", def:"vervuiling van lucht, water of bodem", ex:"De verontreiniging van de rivier was een groot probleem." },
  { type:"woord", term:"vijand, de", def:"iemand die vijandig staat tegenover iemand; tegenstander", ex:"In oorlogstijd is het moeilijk vriend van vijand te onderscheiden." },
  { type:"woord", term:"waarmaken", def:"iets wat je beloofd hebt werkelijk doen", ex:"Ze maakte haar belofte waar en studeerde af met lof." },
  { type:"woord", term:"wonderbaarlijk", def:"heel bijzonder en bijna ongelooflijk", ex:"Het was wonderbaarlijk dat hij de crash overleefde." },
  { type:"woord", term:"zijkant, de", def:"de kant die links of rechts is, niet voor of achter", ex:"Aan de zijkant van het gebouw was een kleine deur." },
  { type:"woord", term:"zuiver", def:"puur en onvervuild; ook: correct of nauwkeurig", ex:"Het bronwater was zuiver en fris." },
  { type:"verbinding", term:"naar aanleiding van iets", def:"als reactie op iets; naar aanleiding van een gebeurtenis", ex:"Naar aanleiding van de klachten werd een onderzoek gestart." },
  { type:"verbinding", term:"zich wijden aan iets/iemand", def:"al je tijd en energie besteden aan iets of iemand", ex:"Hij wijdde zijn leven aan de studie van het heelal." },
  { type:"verbinding", term:"zich zetten aan iets", def:"serieus beginnen met iets", ex:"Ze zette zich aan de moeilijke opgave en werkte urenlang door." },
  { type:"idioom", term:"beneden zijn stand", def:"iets doen wat niet past bij iemands positie in de maatschappij", ex:"Hij vond het beneden zijn stand om in een kleine winkel te werken." },
  { type:"idioom", term:"buiten het bestek vallen/gaan", def:"niet binnen het plan of het onderwerp vallen", ex:"Die vraag valt buiten het bestek van dit gesprek." },
  { type:"idioom", term:"een sleutelrol spelen", def:"heel belangrijk zijn in iets", ex:"De stoommachine speelde een sleutelrol in de industriële revolutie." },
  { type:"idioom", term:"iemand onderuit halen/schoppen", def:"veel kritiek hebben op iemand; in diskrediet brengen", ex:"De journalist probeerde de politicus onderuit te halen." },
  { type:"idioom", term:"onder de pet houden", def:"iets geheimhouden; niet openbaar maken", ex:"De directeur hield de slechte resultaten lang onder de pet." },
  { type:"idioom", term:"op scherp staan", def:"gespannen zijn; klaar zijn om in actie te komen", ex:"De politie stond op scherp tijdens het grote evenement." },
  { type:"idioom", term:"tot de verbeelding spreken", def:"heel veel indruk maken; de fantasie prikkelen", ex:"De ruimtevaart blijft tot de verbeelding spreken van kinderen." },
  { type:"idioom", term:"van formaat", def:"van betekenis en belang; indrukwekkend", ex:"Galileo Galilei was een wetenschapper van formaat." },
  { type:"idioom", term:"voor raadsels stellen", def:"onbegrijpelijk zijn voor iemand", ex:"Zijn gedrag stelde zijn collega's voor raadsels." }
];
let cards=[...ALL_CARDS],current=0,isFlipped=false,known=0,filter='all',reviewed=new Set();
function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');cards=f==='all'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.type===f);current=0;known=0;reviewed.clear();isFlipped=false;document.getElementById('scorePanel').classList.remove('show');document.getElementById('scene').style.display='';document.querySelectorAll('.nav-row,.feedback-row,.progress-bar-wrap').forEach(el=>el.style.display='');document.getElementById('fbHint').style.display='none';renderCard();}
function renderCard(){if(!cards.length)return;const c=cards[current];document.getElementById('cardInner').classList.remove('flipped');isFlipped=false;document.getElementById('cardNum').textContent=(current+1)+'/'+cards.length;document.getElementById('cur').textContent=current+1;document.getElementById('tot').textContent=cards.length;document.getElementById('cardTerm').textContent=c.term;document.getElementById('cardDef').textContent=c.def;document.getElementById('cardEx').textContent=c.ex;const badges={woord:'tag-woord-badge',verbinding:'tag-verbinding-badge',idioom:'tag-idioom-badge'};const tag=document.getElementById('cardTag');tag.textContent=c.type;tag.className='card-tag '+(badges[c.type]||'');document.getElementById('progressBar').style.width=(current/cards.length*100)+'%';document.getElementById('feedbackRow').style.display='none';document.getElementById('fbHint').style.display='block';}
function flipCard(){isFlipped=!isFlipped;document.getElementById('cardInner').classList.toggle('flipped',isFlipped);document.getElementById('feedbackRow').style.display=isFlipped?'flex':'none';document.getElementById('fbHint').style.display=isFlipped?'none':'block';}
function nextCard(){if(current<cards.length-1){current++;renderCard();}else showScore();}
function prevCard(){if(current>0){current--;renderCard();}}
function markCard(ok){if(!reviewed.has(current)){reviewed.add(current);if(ok)known++;}nextCard();}
function shuffleCards(){cards=[...cards].sort(()=>Math.random()-0.5);current=0;known=0;reviewed.clear();isFlipped=false;document.getElementById('scorePanel').classList.remove('show');document.getElementById('scene').style.display='';document.querySelectorAll('.nav-row,.progress-bar-wrap').forEach(el=>el.style.display='');renderCard();}
function showScore(){document.getElementById('scorePanel').classList.add('show');document.getElementById('scene').style.display='none';document.querySelectorAll('.nav-row,.feedback-row,.progress-bar-wrap,.fb-hint').forEach(el=>el.style.display='none');const total=cards.length;document.getElementById('scoreNum').textContent=known+'/'+total;const pct=total>0?known/total:0;let msg=pct===1?'Geweldig! Je kent alle woorden van H7.1!':pct>=0.8?'Heel goed! Nog een paar herhalen.':pct>=0.5?'Aardig op weg! Oefen de moeilijke woorden nog eens.':'Ga nog eens door de kaarten — je komt er!';document.getElementById('scoreMsg').textContent=msg;}
function restart(){current=0;known=0;reviewed.clear();isFlipped=false;document.getElementById('scorePanel').classList.remove('show');document.getElementById('scene').style.display='';document.querySelectorAll('.nav-row,.progress-bar-wrap').forEach(el=>el.style.display='');document.getElementById('fbHint').style.display='block';renderCard();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextCard();else if(e.key==='ArrowLeft')prevCard();else if(e.key===' '){e.preventDefault();flipCard();}else if((e.key==='k'||e.key==='K')&&isFlipped)markCard(true);else if((e.key==='o'||e.key==='O')&&isFlipped)markCard(false);});
renderCard();
</script>
